<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试终端</title>
    <!-- 引入xterm.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <!-- 引入xterm.js核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <!-- 引入xterm.js附件库 -->
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm-addon-fit.min.js"></script>
    <style>
        #terminal {
            width: 800px;
            height: 600px;
            margin: 20px auto;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>测试终端</h1>
    <div id="terminal"></div>

    <script>
        // 测试终端
        function testTerminal() {
            try {
                console.log('开始测试终端');
                
                // 创建终端实例
                var terminal = new Terminal({
                    cursorBlink: true,
                    scrollback: 1000
                });
                
                // 创建fit插件实例
                var fitAddon = new FitAddon();
                terminal.loadAddon(fitAddon);
                
                // 打开终端
                terminal.open(document.getElementById('terminal'));
                
                // 适应容器大小
                fitAddon.fit();
                
                terminal.write('终端初始化成功！\r\n');
                terminal.write('正在测试WebSocket连接...\r\n');
                
                // 测试WebSocket连接
                // 注意：这里需要替换为实际的设备ID和连接信息
                var wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                var wsURL = wsProtocol + '//' + window.location.host + '/api/v1/devices/1/webterm';
                wsURL += '?username=test&password=test&port=22';
                
                terminal.write('WebSocket URL: ' + wsURL + '\r\n');
                
                var ws = new WebSocket(wsURL);
                
                ws.onopen = function() {
                    terminal.write('WebSocket连接成功！\r\n');
                    terminal.write('\r\n$ ');
                };
                
                ws.onmessage = function(event) {
                    terminal.write(event.data);
                };
                
                ws.onclose = function(event) {
                    terminal.write('\r\nWebSocket连接关闭: ' + event.code + ' - ' + event.reason);
                };
                
                ws.onerror = function(error) {
                    terminal.write('\r\nWebSocket连接错误: ' + error.message);
                };
                
                terminal.onData(function(data) {
                    terminal.write(data);
                    if (ws.readyState === WebSocket.OPEN) {
                        ws.send(data);
                    }
                });
                
            } catch (error) {
                console.error('终端测试失败:', error);
                var terminalDiv = document.getElementById('terminal');
                terminalDiv.innerHTML = '<div style="color: red; padding: 10px;">终端测试失败: ' + error.message + '</div>';
            }
        }
        
        // 页面加载完成后测试终端
        window.addEventListener('load', testTerminal);
    </script>
</body>
</html>
