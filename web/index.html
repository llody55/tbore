<body class="layui-layout-body">

                        <dl class="layui-nav-child">
                            <dd class="layui-this"><a href="javascript:;" data-page="dashboard"><i class="layui-icon layui-icon-home"></i><cite>仪表盘</cite></a></dd>
                        </dl>
                    </li>
                    <li class="layui-nav-item">
                        <a href="javascript:;"><i class="layui-icon layui-icon-component"></i><cite>系统管理</cite></a>

        <div class="layui-body">

                <span class="layui-breadcrumb" id="breadcrumb" lay-separator="/">

                    <button class="layui-btn layui-btn-primary layui-btn-sm" onclick="refreshPage()">
                        <i class="layui-icon layui-icon-refresh-3"></i>
                    </button>
                </div>
            </div>
            
            <div id="main-content" style="padding: 20px;"></div>
        </div>

        <div class="layui-footer">
            <div class="footer-inner">
                <span>tbore-pro © 2026 企业级内网穿透</span>
                <span class="status-online"><span class="pulse-dot"></span> 服务正常</span>

    <script>
        layui.use(['element', 'layer', 'util'], function() {
            var element = layui.element;
            var layer = layui.layer;
            var util = layui.util;
            var $ = layui.$;
            
            // 移除了侧边栏伸缩功能，保留基本功能
            
            // 页面加载函数
            function loadPage(page) {
                $('#main-content').load('pages/' + page + '.html', function() {
                    // 页面加载完成后，调用页面的初始化函数
                    if (typeof initPage === 'function') {
                        initPage();
                    }
                });
            }
            
            // 初始加载仪表盘页面
            loadPage('dashboard');
            
            // 监听菜单项点击事件
            $('[data-page]').on('click', function() { 
                // 移除所有菜单项的选中状态
                $('.layui-nav-item a').removeClass('layui-this');
                // 添加当前菜单项的选中状态
                $(this).addClass('layui-this');
                // 加载对应的页面
                loadPage($(this).data('page')); 
            });
        });
    </script>
</body>
</html>
