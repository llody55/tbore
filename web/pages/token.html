<!-- Token管理页面 -->
<div class="layui-fluid" style="padding: 15px;">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md4">
            <div class="layui-card stat-card-mini">
                <div class="layui-card-body">
                    <div class="stat-icon"><i class="layui-icon layui-icon-key"></i></div>
                    <div class="stat-content">
                        <div class="stat-title">总Token数</div>
                        <div class="stat-value" id="stat-total-token">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="layui-col-md4">
            <div class="layui-card stat-card-mini">
                <div class="layui-card-body">
                    <div class="stat-icon online"><i class="layui-icon layui-icon-vercode"></i></div>
                    <div class="stat-content">
                        <div class="stat-title">正常</div>
                        <div class="stat-value online" id="stat-active-token">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="layui-col-md4">
            <div class="layui-card stat-card-mini">
                <div class="layui-card-body">
                    <div class="stat-icon offline"><i class="layui-icon layui-icon-close-fill"></i></div>
                    <div class="stat-content">
                        <div class="stat-title">已禁用</div>
                        <div class="stat-value offline" id="stat-inactive-token">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">
                    <span>Token管理</span>
                </div>
                <div class="layui-card-body">
                    <form class="layui-form layui-form-pane" style="margin-bottom: 15px; display: flex; justify-content: flex-start; align-items: center; flex-wrap: wrap; gap: 10px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <button type="button" class="layui-btn layui-btn-sm" id="add-token-btn">
                                <i class="layui-icon layui-icon-add-1"></i> 创建
                            </button>
                            <button type="button" class="layui-btn layui-btn-sm layui-btn-danger" id="batch-delete-btn">
                                <i class="layui-icon layui-icon-delete"></i> 批量删除
                            </button>
                            <button type="button" class="layui-btn layui-btn-sm layui-btn-warm" id="batch-enable-btn">
                                <i class="layui-icon layui-icon-play"></i> 批量启用
                            </button>
                            <button type="button" class="layui-btn layui-btn-sm layui-btn-warning" id="batch-disable-btn">
                                <i class="layui-icon layui-icon-pause"></i> 批量禁用
                            </button>
                            <div class="layui-btn-group">
                                <button type="button" class="layui-btn layui-btn-sm">
                                    <i class="layui-icon layui-icon-down"></i> 更多操作
                                </button>
                                <button type="button" class="layui-btn layui-btn-sm">
                                    <i class="layui-icon layui-icon-set"></i>
                                </button>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px; margin-left: auto;">
                            <div class="layui-inline">
                                <input type="text" name="name" placeholder="搜索Token名称..." class="layui-input" style="width: 200px;">
                            </div>
                            <div class="layui-inline">
                                <select name="status" lay-filter="token-status-filter" style="width: 120px;">
                                    <option value="">所有状态</option>
                                    <option value="active">正常</option>
                                    <option value="inactive">已禁用</option>
                                </select>
                            </div>
                            <button class="layui-btn layui-btn-normal" lay-submit lay-filter="search">搜索</button>
                            <button type="button" class="layui-btn layui-btn-primary layui-btn-sm" id="refresh-table">
                                <i class="layui-icon layui-icon-refresh"></i> 刷新
                            </button>
                        </div>
                    </form>
                    <table id="token-table" lay-filter="token-table"></table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Token添加弹窗 -->
<div id="token-add-form" style="display: none;">
    <form class="layui-form" lay-filter="token-add-form">
        <div class="layui-form-item">
            <label class="layui-form-label">Token名称</label>
            <div class="layui-input-block">
                <input type="text" name="name" required lay-verify="required" placeholder="请输入Token名称" autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">描述</label>
            <div class="layui-input-block">
                <textarea name="description" placeholder="请输入描述" class="layui-textarea"></textarea>
            </div>
        </div>
        <div class="layui-form-item layui-form-text">
            <div class="layui-input-block">
                <button class="layui-btn" lay-submit lay-filter="token-add-submit">生成</button>
                <button type="button" class="layui-btn layui-btn-primary" onclick="layer.closeAll()">取消</button>
            </div>
        </div>
    </form>
</div>

<script>
    // Token管理页面配置
    function initPage() {
        PageManager.init('token', {
            // 表格配置
            table: {
                elem: '#token-table',
                url: '/api/v1/tokens',
                toolFilter: 'token-table',
                checkFilter: 'token-table',
                cols: [
                    {type: 'checkbox', fixed: 'left'},
                    {field: 'id', title: 'ID', width: 80, sort: true},
                    {field: 'name', title: '名称', width: 150},
                    {field: 'value', title: 'Token值', width: 300},
                    {field: 'description', title: '描述', minWidth: 200},
                    {field: 'status', title: '状态', width: 100, templet: function(d) {
                        return d.status === 'active' ? '<span class="status-badge-green"><span class="dot-online"></span> 正常</span>' : '<span class="status-badge-gray"><span class="dot-offline"></span> 禁用</span>';
                    }},
                    {field: 'used_hosts', title: '使用主机数', width: 120, templet: function(d) {
                        // 目前使用占位数据，实际项目中应从API获取真实数据
                        return d.used_hosts || 0;
                    }},
                    {field: 'created_at', title: '创建时间', width: 180},
                    {field: 'updated_at', title: '更新时间', width: 180},
                    {title: '操作', width: 250, align: 'center', fixed: 'right', templet: function(d) {
                        var actions = '';
                        if (d.status === 'active') {
                            actions += '<a class="layui-btn layui-btn-xs layui-btn-warning" lay-event="disable"><i class="layui-icon layui-icon-pause"></i> 禁用</a> ';
                        } else {
                            actions += '<a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="enable"><i class="layui-icon layui-icon-play"></i> 启用</a> ';
                        }
                        actions += '<a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="delete"><i class="layui-icon layui-icon-delete"></i> 删除</a> ';
                        actions += '<a class="layui-btn layui-btn-xs" lay-event="edit"><i class="layui-icon layui-icon-edit"></i> 编辑</a>';
                        return actions;
                    }}
            ],
            // 表格工具事件
            toolEvents: {
                delete: function(obj) {
                    PageManager.layui.layer.confirm('确定要删除这个Token吗？<br>注意：删除后，使用此Token的Agent将无法连接到服务器，且数据不可恢复！', {
                        icon: 3, 
                        title: '警告', 
                        shade: 0, // 不显示遮罩层，避免背景变灰
                        shadeClose: true, // 点击遮罩层外区域关闭
                        zIndex: layer.zIndex + 100 // 设置更高的zIndex确保不被遮挡
                    }, function(index) {
                        Utils.ajax({
                            url: '/api/v1/tokens/' + obj.data.id,
                            type: 'DELETE',
                            success: function(res) {
                                PageManager.showMessage('删除成功', 1);
                                PageManager.refreshTable();
                            },
                            error: function(xhr) {
                                PageManager.showMessage('删除失败: ' + (xhr.responseJSON ? xhr.responseJSON.error : '未知错误'), 2);
                            }
                        });
                        PageManager.layui.layer.close(index);
                    });
                },
                disable: function(obj) {
                    PageManager.layui.layer.confirm('确定要禁用这个Token吗？<br>注意：禁用后，使用此Token的Agent将无法连接到服务器！', {
                        icon: 3, 
                        title: '警告', 
                        shade: 0, // 不显示遮罩层，避免背景变灰
                        shadeClose: true, // 点击遮罩层外区域关闭
                        zIndex: layer.zIndex + 100 // 设置更高的zIndex确保不被遮挡
                    }, function(index) {
                        Utils.ajax({
                            url: '/api/v1/tokens/' + obj.data.id + '/status',
                            type: 'PUT',
                            data: JSON.stringify({status: 'inactive'}),
                            success: function(res) {
                                PageManager.showMessage('Token已禁用', 1);
                                PageManager.refreshTable();
                            },
                            error: function(xhr) {
                                PageManager.showMessage('禁用失败: ' + (xhr.responseJSON ? xhr.responseJSON.error : '未知错误'), 2);
                            }
                        });
                        PageManager.layui.layer.close(index);
                    });
                },
                enable: function(obj) {
                    PageManager.layui.layer.confirm('确定要启用这个Token吗？', {
                        icon: 3, 
                        title: '提示', 
                        shade: 0, // 不显示遮罩层，避免背景变灰
                        shadeClose: true, // 点击遮罩层外区域关闭
                        zIndex: layer.zIndex + 100 // 设置更高的zIndex确保不被遮挡
                    }, function(index) {
                        Utils.ajax({
                            url: '/api/v1/tokens/' + obj.data.id + '/status',
                            type: 'PUT',
                            data: JSON.stringify({status: 'active'}),
                            success: function(res) {
                                PageManager.showMessage('Token已启用', 1);
                                PageManager.refreshTable();
                            },
                            error: function(xhr) {
                                PageManager.showMessage('启用失败: ' + (xhr.responseJSON ? xhr.responseJSON.error : '未知错误'), 2);
                            }
                        });
                        PageManager.layui.layer.close(index);
                    });
                },
                edit: function(obj) {
                    editToken(obj.data);
                }
            }
        },
        // 事件配置
        events: {
            // 表单提交事件
            onFormSubmit: {
                'token-add-submit': function(data) {
                    Utils.ajax({
                        url: '/api/v1/tokens',
                        type: 'POST',
                        data: JSON.stringify(data.field),
                        success: function(res) {
                            PageManager.showMessage('生成成功', 1);
                            PageManager.refreshTable();
                            PageManager.layui.layer.closeAll();
                        },
                        error: function(xhr) {
                            PageManager.showMessage('生成失败: ' + xhr.responseJSON.error, 2);
                        }
                    });
                    return false;
                }
            }
        },
        // 页面初始化回调
        onInit: function() {
            // 加载统计数据
            loadTokenStats();
            
            // 绑定按钮事件
            $('#add-token-btn').on('click', function() {
                addToken();
            });
            
            $('#batch-delete-btn').on('click', function() {
                var checkStatus = PageManager.layui.table.checkStatus('token-table');
                if (checkStatus.data.length > 0) {
                    var ids = checkStatus.data.map(function(item) {
                        return item.id;
                    });
                    PageManager.layui.layer.confirm('确定要删除选中的Token吗？<br>注意：删除后，使用这些Token的Agent将无法连接到服务器，且数据不可恢复！', {
                        icon: 3, 
                        title: '警告', 
                        shade: 0, // 不显示遮罩层，避免背景变灰
                        shadeClose: true, // 点击遮罩层外区域关闭
                        zIndex: layer.zIndex + 100 // 设置更高的zIndex确保不被遮挡
                    }, function(index) {
                        // 批量删除逻辑
                        ids.forEach(function(id) {
                            Utils.ajax({
                                url: '/api/v1/tokens/' + id,
                                type: 'DELETE',
                                success: function(res) {
                                    PageManager.refreshTable();
                                    loadTokenStats();
                                }
                            });
                        });
                        PageManager.showMessage('删除成功', 1);
                        PageManager.layui.layer.close(index);
                    });
                } else {
                    PageManager.showMessage('请先选择要删除的Token', 0);
                }
            });
            
            $('#batch-enable-btn').on('click', function() {
                var checkStatus = PageManager.layui.table.checkStatus('token-table');
                if (checkStatus.data.length > 0) {
                    checkStatus.data.forEach(function(item) {
                        Utils.ajax({
                            url: '/api/v1/tokens/' + item.id + '/status',
                            type: 'PUT',
                            data: JSON.stringify({status: 'active'}),
                            success: function(res) {
                                PageManager.refreshTable();
                                loadTokenStats();
                            }
                        });
                    });
                    PageManager.showMessage('批量启用成功', 1);
                } else {
                    PageManager.showMessage('请先选择要启用的Token', 0);
                }
            });
            
            $('#batch-disable-btn').on('click', function() {
                var checkStatus = PageManager.layui.table.checkStatus('token-table');
                if (checkStatus.data.length > 0) {
                    PageManager.layui.layer.confirm('确定要禁用选中的Token吗？<br>注意：禁用后，使用这些Token的Agent将无法连接到服务器！', {
                        icon: 3, 
                        title: '警告', 
                        shade: 0, // 不显示遮罩层，避免背景变灰
                        shadeClose: true, // 点击遮罩层外区域关闭
                        zIndex: layer.zIndex + 100 // 设置更高的zIndex确保不被遮挡
                    }, function(index) {
                        checkStatus.data.forEach(function(item) {
                            Utils.ajax({
                                url: '/api/v1/tokens/' + item.id + '/status',
                                type: 'PUT',
                                data: JSON.stringify({status: 'inactive'}),
                                success: function(res) {
                                    PageManager.refreshTable();
                                    loadTokenStats();
                                }
                            });
                        });
                        PageManager.showMessage('批量禁用成功', 1);
                        PageManager.layui.layer.close(index);
                    });
                } else {
                    PageManager.showMessage('请先选择要禁用的Token', 0);
                }
            });
            
            $('#refresh-table').on('click', function() {
                PageManager.refreshTable();
                loadTokenStats();
            });
        }
    });
    }
    
    // 加载Token统计数据
    function loadTokenStats() {
        Utils.ajax({
            url: '/api/v1/tokens',
            type: 'GET',
            success: function(res) {
                var tokens = res.data || [];
                var total = tokens.length;
                var active = tokens.filter(function(token) { return token.status === 'active'; }).length;
                var inactive = tokens.filter(function(token) { return token.status === 'inactive'; }).length;
                
                // 更新统计数据
                $('#stat-total-token').text(total);
                $('#stat-active-token').text(active);
                $('#stat-inactive-token').text(inactive);
            },
            error: function(xhr) {
                console.error('加载统计数据失败:', xhr);
            }
        });
    }
    // 编辑Token
    function editToken(data) {
        PageManager.layui.layer.open({
            type: 1,
            title: '编辑Token',
            area: ['500px', '300px'],
            content: '<form class="layui-form" id="token-edit-form"><div class="layui-form-item"><label class="layui-form-label">Token名称</label><div class="layui-input-block"><input type="text" name="name" value="'+data.name+'" required lay-verify="required" placeholder="请输入Token名称" autocomplete="off" class="layui-input"></div></div><div class="layui-form-item"><label class="layui-form-label">描述</label><div class="layui-input-block"><textarea name="description" placeholder="请输入描述" class="layui-textarea">'+data.description+'</textarea></div></div><div class="layui-form-item layui-form-text"><div class="layui-input-block"><button class="layui-btn" lay-submit lay-filter="token-edit-submit">保存</button><button type="button" class="layui-btn layui-btn-primary" onclick="PageManager.layui.layer.closeAll()">取消</button></div></div></form>',
            success: function(layero, index) {
                PageManager.layui.form.render();
                
                // 监听表单提交
                PageManager.layui.form.on('submit(token-edit-submit)', function(formData) {
                    Utils.ajax({
                        url: '/api/v1/tokens/' + data.id,
                        type: 'PUT',
                        data: JSON.stringify(formData.field),
                        success: function(res) {
                            PageManager.showMessage('更新成功', 1);
                            PageManager.refreshTable();
                            PageManager.layui.layer.closeAll();
                        },
                        error: function(xhr) {
                            PageManager.showMessage('更新失败: ' + xhr.responseJSON.error, 2);
                        }
                    });
                    return false;
                });
            },
            shade: 0, // 不显示遮罩层
            shadeClose: false // 点击遮罩不关闭
        });
    }

    // 生成新Token
    window.addToken = function() {
        PageManager.layui.layer.open({
            type: 1,
            title: '创建新Token',
            area: ['500px', '300px'],
            content: $('#token-add-form'),
            success: function(layero, index) {
                // 重置表单
                PageManager.layui.form.val('token-add-form', {});
            },
            zIndex: PageManager.layui.layer.zIndex + 100, // 设置更高层级，确保弹窗显示在最上层
            shade: 0, // 不显示遮罩层
            shadeClose: false // 点击遮罩不关闭
        });
    };
</script>
