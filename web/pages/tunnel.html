<!-- 隧道管理页面 -->
<div class="layui-fluid" style="padding: 15px;">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md4">
            <div class="layui-card stat-card-mini">
                <div class="layui-card-body">
                    <div class="stat-icon"><i class="layui-icon layui-icon-sitemap"></i></div>
                    <div class="stat-content">
                        <div class="stat-title">总隧道数</div>
                        <div class="stat-value" id="stat-total-tunnel">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="layui-col-md4">
            <div class="layui-card stat-card-mini">
                <div class="layui-card-body">
                    <div class="stat-icon online"><i class="layui-icon layui-icon-play"></i></div>
                    <div class="stat-content">
                        <div class="stat-title">运行中</div>
                        <div class="stat-value online" id="stat-active-tunnel">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="layui-col-md4">
            <div class="layui-card stat-card-mini">
                <div class="layui-card-body">
                    <div class="stat-icon offline"><i class="layui-icon layui-icon-pause"></i></div>
                    <div class="stat-content">
                        <div class="stat-title">已停止</div>
                        <div class="stat-value offline">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">
                    <span>隧道列表</span>
                </div>
                <div class="layui-card-body">
                    <form class="layui-form layui-form-pane" style="margin-bottom: 15px; display: flex; justify-content: flex-start; align-items: center; flex-wrap: wrap; gap: 10px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <button type="button" class="layui-btn layui-btn-sm" id="add-tunnel-btn">
                                <i class="layui-icon layui-icon-add-1"></i> 创建
                            </button>
                            <button type="button" class="layui-btn layui-btn-sm layui-btn-danger" id="batch-delete-btn">
                                <i class="layui-icon layui-icon-delete"></i> 批量删除
                            </button>
                            <button type="button" class="layui-btn layui-btn-sm layui-btn-warm" id="batch-start-btn">
                                <i class="layui-icon layui-icon-play"></i> 批量启动
                            </button>
                            <button type="button" class="layui-btn layui-btn-sm layui-btn-warning" id="batch-stop-btn">
                                <i class="layui-icon layui-icon-pause"></i> 批量停止
                            </button>
                            <div class="layui-btn-group">
                                <button type="button" class="layui-btn layui-btn-sm">
                                    <i class="layui-icon layui-icon-down"></i> 更多操作
                                </button>
                                <button type="button" class="layui-btn layui-btn-sm">
                                    <i class="layui-icon layui-icon-set"></i>
                                </button>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px; margin-left: auto;">
                            <div class="layui-inline">
                                <input type="text" name="name" placeholder="搜索隧道名称..." class="layui-input" style="width: 200px;">
                            </div>
                            <div class="layui-inline">
                                <select name="type" lay-search lay-filter="tunnel-type-filter" style="width: 120px;">
                                    <option value="">所有类型</option>
                                    <option value="tcp">TCP</option>
                                    <option value="udp">UDP</option>
                                    <option value="websocket">WebSocket</option>
                                </select>
                            </div>
                            <div class="layui-inline">
                                <select name="status" lay-filter="tunnel-status-filter" style="width: 120px;">
                                    <option value="">所有状态</option>
                                    <option value="active">运行中</option>
                                    <option value="inactive">已停止</option>
                                </select>
                            </div>
                            <button class="layui-btn layui-btn-normal" lay-submit lay-filter="search">搜索</button>
                            <button type="button" class="layui-btn layui-btn-primary layui-btn-sm" id="refresh-table">
                                <i class="layui-icon layui-icon-refresh"></i> 刷新
                            </button>
                        </div>
                    </form>
                    <table id="tunnel-table" lay-filter="tunnel-table"></table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 隧道添加弹窗 -->
<div id="tunnel-add-form" style="display: none;">
    <form class="layui-form" action="" lay-filter="tunnel-add-form">
        <div class="layui-form-item">
            <label class="layui-form-label">隧道名称</label>
            <div class="layui-input-block">
                <input type="text" name="name" required lay-verify="required" placeholder="请输入隧道名称" autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">设备ID</label>
            <div class="layui-input-block">
                <input type="number" name="device_id" required lay-verify="required" placeholder="请输入设备ID" autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">隧道类型</label>
            <div class="layui-input-block">
                <select name="type" lay-verify="required">
                    <option value="tcp">TCP</option>
                    <option value="udp">UDP</option>
                    <option value="websocket">WebSocket</option>
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">本地IP</label>
            <div class="layui-input-block">
                <input type="text" name="local_ip" required lay-verify="required" placeholder="请输入本地IP" autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">本地端口</label>
            <div class="layui-input-block">
                <input type="number" name="local_port" required lay-verify="required" placeholder="请输入本地端口" autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">远程端口</label>
            <div class="layui-input-block">
                <input type="number" name="remote_port" required lay-verify="required" placeholder="请输入远程端口" autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item layui-form-text">
            <div class="layui-input-block">
                <button class="layui-btn" lay-submit lay-filter="tunnel-add-submit">添加</button>
                <button type="button" class="layui-btn layui-btn-primary" onclick="PageManager.layui.layer.closeAll()">取消</button>
            </div>
        </div>
    </form>
</div>

<script>
    // 格式化字节数
    function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        var k = 1024;
        var sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
        var i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    // 隧道管理页面配置
    function initPage() {
        PageManager.init('tunnel', {
            // 表格配置
            table: {
                elem: '#tunnel-table',
                url: '/api/v1/tunnels',
                toolFilter: 'tunnel-table',
            checkFilter: 'tunnel-table',
            cols: [
                {type: 'checkbox', fixed: 'left'},
                {field: 'id', title: 'ID', width: 80, sort: true},
                {field: 'name', title: '隧道名称', width: 150},
                {field: 'type', title: '类型', width: 100},
                {field: 'local_ip', title: '本地IP', width: 120},
                {field: 'local_port', title: '本地端口', width: 100},
                {field: 'remote_port', title: '远程端口', width: 100, sort: true},
                {field: 'status', title: '状态', width: 100, templet: function(d) {
                    return d.status === 'active' ? '<span class="status-badge-green"><span class="dot-online"></span> 运行中</span>' : '<span class="status-badge-gray"><span class="dot-offline"></span> 已停止</span>';
                }},
                {field: 'connection_count', title: '当前连接', width: 100, sort: true},
                {field: 'total_connections', title: '总连接数', width: 120, sort: true},
                {field: 'bytes_sent', title: '发送流量', width: 120, templet: formatBytes},
                {field: 'bytes_recv', title: '接收流量', width: 120, templet: formatBytes},
                {field: 'last_active', title: '最后活跃', width: 180},
                {field: 'created_at', title: '创建时间', width: 180},
                {title: '操作', width: 200, align: 'center', fixed: 'right', templet: function(d) {
                    var actions = '';
                    if (d.status === 'active') {
                        actions += '<a class="layui-btn layui-btn-xs layui-btn-warning" lay-event="deactivate"><i class="layui-icon layui-icon-pause"></i> 停用</a> ';
                    } else {
                        actions += '<a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="activate"><i class="layui-icon layui-icon-play"></i> 启用</a> ';
                    }
                    actions += '<a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="delete"><i class="layui-icon layui-icon-delete"></i> 删除</a> ';
                    actions += '<a class="layui-btn layui-btn-xs" lay-event="edit"><i class="layui-icon layui-icon-edit"></i> 编辑</a> ';
                    actions += '<a class="layui-btn layui-btn-xs layui-btn-primary" lay-event="stats"><i class="layui-icon layui-icon-chart"></i> 统计</a>';
                    return actions;
                }}
            ],
            // 表格工具事件
            toolEvents: {
                delete: function(obj) {
                    PageManager.layui.layer.confirm('确定要删除这条隧道吗？<br>注意：删除后，该隧道的所有连接将被断开，且数据不可恢复！', {
                        icon: 3, 
                        title: '警告', 
                        shade: 0, // 不显示遮罩层，避免背景变灰
                        shadeClose: true, // 点击遮罩层外区域关闭
                        zIndex: layer.zIndex + 100 // 设置更高的zIndex确保不被遮挡
                    }, function(index) {
                        Utils.ajax({
                            url: '/api/v1/tunnels/' + obj.data.id,
                            type: 'DELETE',
                            success: function(res) {
                                PageManager.showMessage('删除成功', 1);
                                PageManager.refreshTable();
                                PageManager.layui.layer.close(index);
                            },
                            error: function(xhr) {
                                PageManager.showMessage('删除失败: ' + (xhr.responseJSON ? xhr.responseJSON.error : '未知错误'), 2);
                            }
                        });
                    });
                },
                activate: function(obj) {
                    Utils.ajax({
                        url: '/api/v1/tunnels/' + obj.data.id + '/status',
                        type: 'PUT',
                        data: JSON.stringify({status: 'active'}),
                        success: function(res) {
                            PageManager.showMessage('隧道已启用', 1);
                            PageManager.refreshTable();
                        },
                        error: function(xhr) {
                            PageManager.showMessage('启用失败: ' + (xhr.responseJSON ? xhr.responseJSON.error : '未知错误'), 2);
                        }
                    });
                },
                deactivate: function(obj) {
                    PageManager.layui.layer.confirm('确定要停用这条隧道吗？<br>注意：停用后，该隧道的所有连接将被断开！', {
                        icon: 3, 
                        title: '警告', 
                        shade: 0, // 不显示遮罩层，避免背景变灰
                        shadeClose: true, // 点击遮罩层外区域关闭
                        zIndex: layer.zIndex + 100 // 设置更高的zIndex确保不被遮挡
                    }, function(index) {
                        Utils.ajax({
                            url: '/api/v1/tunnels/' + obj.data.id + '/status',
                            type: 'PUT',
                            data: JSON.stringify({status: 'inactive'}),
                            success: function(res) {
                                PageManager.showMessage('隧道已停用', 1);
                                PageManager.refreshTable();
                                PageManager.layui.layer.close(index);
                            },
                            error: function(xhr) {
                                PageManager.showMessage('停用失败: ' + (xhr.responseJSON ? xhr.responseJSON.error : '未知错误'), 2);
                            }
                        });
                    });
                },
                edit: function(obj) {
                    editTunnel(obj.data);
                },
                stats: function(obj) {
                    // 显示隧道统计详情
                PageManager.layui.layer.open({
                    type: 1,
                    title: '隧道统计详情 - ' + obj.data.name,
                    area: ['600px', '450px'],
                    content: '<div style="padding: 20px;"><table class="layui-table" lay-skin="line"><thead><tr><th>统计项</th><th>数值</th></tr></thead><tbody><tr><td>隧道ID</td><td>' + obj.data.id + '</td></tr><tr><td>隧道名称</td><td>' + obj.data.name + '</td></tr><tr><td>隧道类型</td><td>' + obj.data.type + '</td></tr><tr><td>本地地址</td><td>' + obj.data.local_ip + ':' + obj.data.local_port + '</td></tr><tr><td>远程端口</td><td>' + obj.data.remote_port + '</td></tr><tr><td>当前状态</td><td>' + (obj.data.status === 'active' ? '<span class="status-normal">运行中</span>' : '<span class="status-error">已停止</span>') + '</td></tr><tr><td>当前连接数</td><td>' + obj.data.connection_count + '</td></tr><tr><td>总连接数</td><td>' + obj.data.total_connections + '</td></tr><tr><td>发送流量</td><td>' + formatBytes(obj.data.bytes_sent) + '</td></tr><tr><td>接收流量</td><td>' + formatBytes(obj.data.bytes_recv) + '</td></tr><tr><td>最后活跃时间</td><td>' + obj.data.last_active + '</td></tr><tr><td>创建时间</td><td>' + obj.data.created_at + '</td></tr></tbody></table></div>',
                    zIndex: PageManager.layui.layer.zIndex + 100,
                    shade: 0, // 不显示遮罩层
                    shadeClose: false // 点击遮罩不关闭
                });
                }
            }
        },
        // 页面初始化回调
        onInit: function() {
            // 绑定按钮事件
            $('#add-tunnel-btn').on('click', function() {
                addTunnel();
            });
            
            $('#batch-delete-btn').on('click', function() {
                var checkStatus = PageManager.layui.table.checkStatus('tunnel-table');
                if (checkStatus.data.length > 0) {
                    PageManager.layui.layer.confirm('确定要删除选中的隧道吗？', {
                        icon: 3, 
                        title: '警告', 
                        shade: 0, // 不显示遮罩层，避免背景变灰
                        shadeClose: true, // 点击遮罩层外区域关闭
                        zIndex: layer.zIndex + 100 // 设置更高的zIndex确保不被遮挡
                    }, function(index) {
                        checkStatus.data.forEach(function(item) {
                            Utils.ajax({
                                url: '/api/v1/tunnels/' + item.id,
                                type: 'DELETE',
                                success: function(res) {
                                    PageManager.refreshTable();
                                }
                            });
                        });
                        PageManager.showMessage('删除成功', 1);
                        PageManager.layui.layer.close(index);
                    });
                } else {
                    PageManager.showMessage('请先选择要删除的隧道', 0);
                }
            });
            
            $('#batch-start-btn').on('click', function() {
                var checkStatus = PageManager.layui.table.checkStatus('tunnel-table');
                if (checkStatus.data.length > 0) {
                    checkStatus.data.forEach(function(item) {
                        Utils.ajax({
                            url: '/api/v1/tunnels/' + item.id + '/status',
                            type: 'PUT',
                            data: JSON.stringify({status: 'active'}),
                            success: function(res) {
                                PageManager.refreshTable();
                            }
                        });
                    });
                    PageManager.showMessage('批量启动成功', 1);
                } else {
                    PageManager.showMessage('请先选择要启动的隧道', 0);
                }
            });
            
            $('#batch-stop-btn').on('click', function() {
                var checkStatus = PageManager.layui.table.checkStatus('tunnel-table');
                if (checkStatus.data.length > 0) {
                    checkStatus.data.forEach(function(item) {
                        Utils.ajax({
                            url: '/api/v1/tunnels/' + item.id + '/status',
                            type: 'PUT',
                            data: JSON.stringify({status: 'inactive'}),
                            success: function(res) {
                                PageManager.refreshTable();
                            }
                        });
                    });
                    PageManager.showMessage('批量停止成功', 1);
                } else {
                    PageManager.showMessage('请先选择要停止的隧道', 0);
                }
            });
            
            $('#refresh-table').on('click', function() {
                PageManager.refreshTable();
                loadTunnelStats();
            });
        }
    });
    }
    
    // 加载隧道统计数据
    function loadTunnelStats() {
        Utils.ajax({
            url: '/api/v1/tunnels',
            type: 'GET',
            success: function(res) {
                var tunnels = res.data || [];
                var total = tunnels.length;
                var active = tunnels.filter(function(tunnel) { return tunnel.status === 'active'; }).length;
                var inactive = tunnels.filter(function(tunnel) { return tunnel.status === 'inactive'; }).length;
                
                // 更新统计数据
                $('#stat-total-tunnel').text(total);
                $('#stat-active-tunnel').text(active);
                $('.stat-value.offline').eq(0).text(inactive);
            },
            error: function(xhr) {
                console.error('加载统计数据失败:', xhr);
            }
        });
    }
    

    // 添加新隧道
    function addTunnel() {
        PageManager.layui.layer.open({
            type: 1,
            title: '添加新隧道',
            area: ['600px', '400px'],
            content: $('#tunnel-add-form'),
            success: function(layero, index) {
                PageManager.layui.form.render();
                
                // 监听表单提交
                PageManager.layui.form.on('submit(tunnel-add-submit)', function(data) {
                    Utils.ajax({
                        url: '/api/v1/tunnels',
                        type: 'POST',
                        data: JSON.stringify(data.field),
                        success: function(res) {
                            PageManager.showMessage('添加成功', 1);
                            PageManager.refreshTable();
                            PageManager.layui.layer.closeAll();
                        },
                        error: function(xhr) {
                            PageManager.showMessage('添加失败: ' + (xhr.responseJSON ? xhr.responseJSON.error : '未知错误'), 2);
                        }
                    });
                    return false;
                });
            },
            zIndex: PageManager.layui.layer.zIndex + 100,
            shade: 0, // 不显示遮罩层
            shadeClose: false // 点击遮罩不关闭
        });
    }
    
    // 编辑隧道
    function editTunnel(data) {
        PageManager.layui.layer.open({
            type: 1,
            title: '编辑隧道',
            area: ['600px', '400px'],
            content: '<form class="layui-form" id="tunnel-edit-form"><div class="layui-form-item"><label class="layui-form-label">隧道名称</label><div class="layui-input-block"><input type="text" name="name" value="'+data.name+'" required lay-verify="required" placeholder="请输入隧道名称" autocomplete="off" class="layui-input"></div></div><div class="layui-form-item"><label class="layui-form-label">设备ID</label><div class="layui-input-block"><input type="number" name="device_id" value="'+data.device_id+'" required lay-verify="required" placeholder="请输入设备ID" autocomplete="off" class="layui-input"></div></div><div class="layui-form-item"><label class="layui-form-label">隧道类型</label><div class="layui-input-block"><select name="type" lay-verify="required"><option value="tcp" '+(data.type === 'tcp' ? 'selected' : '')+'>TCP</option><option value="udp" '+(data.type === 'udp' ? 'selected' : '')+'>UDP</option><option value="websocket" '+(data.type === 'websocket' ? 'selected' : '')+'>WebSocket</option></select></div></div><div class="layui-form-item"><label class="layui-form-label">本地IP</label><div class="layui-input-block"><input type="text" name="local_ip" value="'+data.local_ip+'" required lay-verify="required" placeholder="请输入本地IP" autocomplete="off" class="layui-input"></div></div><div class="layui-form-item"><label class="layui-form-label">本地端口</label><div class="layui-input-block"><input type="number" name="local_port" value="'+data.local_port+'" required lay-verify="required" placeholder="请输入本地端口" autocomplete="off" class="layui-input"></div></div><div class="layui-form-item"><label class="layui-form-label">远程端口</label><div class="layui-input-block"><input type="number" name="remote_port" value="'+data.remote_port+'" required lay-verify="required" placeholder="请输入远程端口" autocomplete="off" class="layui-input"></div></div><div class="layui-form-item layui-form-text"><div class="layui-input-block"><button class="layui-btn" lay-submit lay-filter="tunnel-edit-submit">保存</button><button type="button" class="layui-btn layui-btn-primary" onclick="PageManager.layui.layer.closeAll()">取消</button></div></div></form>',
            success: function(layero, index) {
                PageManager.layui.form.render();
                
                // 监听表单提交
                PageManager.layui.form.on('submit(tunnel-edit-submit)', function(editData) {
                    Utils.ajax({
                        url: '/api/v1/tunnels/' + data.id,
                        type: 'PUT',
                        data: JSON.stringify(editData.field),
                        success: function(res) {
                            PageManager.showMessage('更新成功', 1);
                            PageManager.refreshTable();
                            PageManager.layui.layer.closeAll();
                        },
                        error: function(xhr) {
                            PageManager.showMessage('更新失败: ' + (xhr.responseJSON ? xhr.responseJSON.error : '未知错误'), 2);
                        }
                    });
                    return false;
                });
            },
            shade: 0, // 不显示遮罩层
            shadeClose: false // 点击遮罩不关闭
        });
    }
</script>
