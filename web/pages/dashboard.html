<!-- 仪表盘页面 -->
<div class="layui-fluid" style="padding: 15px;">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md3">
            <div class="layui-card stat-card-mini">
                <div class="layui-card-body">
                    <div class="stat-icon"><i class="layui-icon layui-icon-cellphone"></i></div>
                    <div class="stat-content">
                        <div class="stat-title">总设备数</div>
                        <div class="stat-value" id="stat-total-device">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="layui-col-md3">
            <div class="layui-card stat-card-mini">
                <div class="layui-card-body">
                    <div class="stat-icon online"><i class="layui-icon layui-icon-vercode"></i></div>
                    <div class="stat-content">
                        <div class="stat-title">当前在线</div>
                        <div class="stat-value online" id="stat-online-device">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="layui-col-md3">
            <div class="layui-card stat-card-mini">
                <div class="layui-card-body">
                    <div class="stat-icon"><i class="layui-icon layui-icon-sitemap"></i></div>
                    <div class="stat-content">
                        <div class="stat-title">总隧道数</div>
                        <div class="stat-value" id="stat-total-tunnel">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="layui-col-md3">
            <div class="layui-card stat-card-mini">
                <div class="layui-card-body">
                    <div class="stat-icon online"><i class="layui-icon layui-icon-play"></i></div>
                    <div class="stat-content">
                        <div class="stat-title">活跃隧道</div>
                        <div class="stat-value online" id="stat-active-tunnel">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="layui-row layui-col-space15" style="margin-top: 5px;">
        <div class="layui-col-md3">
            <div class="layui-card stat-card-mini">
                <div class="layui-card-body">
                    <div class="stat-icon"><i class="layui-icon layui-icon-key"></i></div>
                    <div class="stat-content">
                        <div class="stat-title">总Token数</div>
                        <div class="stat-value" id="stat-total-token">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="layui-col-md3">
            <div class="layui-card stat-card-mini">
                <div class="layui-card-body">
                    <div class="stat-icon online"><i class="layui-icon layui-icon-vercode"></i></div>
                    <div class="stat-content">
                        <div class="stat-title">正常Token</div>
                        <div class="stat-value online" id="stat-active-token">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="layui-col-md3">
            <div class="layui-card stat-card-mini">
                <div class="layui-card-body">
                    <div class="stat-icon"><i class="layui-icon layui-icon-user"></i></div>
                    <div class="stat-content">
                        <div class="stat-title">当前连接</div>
                        <div class="stat-value" id="connections">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="layui-col-md3">
            <div class="layui-card stat-card-mini">
                <div class="layui-card-body">
                    <div class="stat-icon"><i class="layui-icon layui-icon-clock"></i></div>
                    <div class="stat-content">
                        <div class="stat-title">运行时间</div>
                        <div class="stat-value" id="uptime">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="layui-row layui-col-space15" style="margin-top: 5px;">
        <div class="layui-col-md8">
            <div class="layui-card">
                <div class="layui-card-header">流量监控趋势 (最近24小时)</div>
                <div class="layui-card-body" style="height: 300px; display: flex; align-items: center; justify-content: center; background: #fafafa; border-radius: 4px;">
                    <p style="color: #999;"><i class="layui-icon layui-icon-chart-screen" style="font-size: 40px; display: block; text-align: center;"></i> 流量图表占位</p>
                </div>
            </div>
        </div>
        <div class="layui-col-md4">
            <div class="layui-card">
                <div class="layui-card-header">系统信息</div>
                <div class="layui-card-body">
                    <table class="layui-table" lay-skin="line">
                        <tbody>
                            <tr><td>服务端版本</td><td><span class="layui-badge layui-bg-blue">v1.2.0</span></td></tr>
                            <tr><td>运行时间</td><td><span id="system-uptime">24天 12小时</span></td></tr>
                            <tr><td>CPU使用率</td><td>
                                <div class="layui-progress" lay-showpercent="yes">
                                    <div class="layui-progress-bar layui-bg-green" lay-percent="35%"></div>
                                </div>
                            </td></tr>
                            <tr><td>内存占用</td><td>
                                <div class="layui-progress" lay-showpercent="yes">
                                    <div class="layui-progress-bar layui-bg-blue" lay-percent="45%"></div>
                                </div>
                            </td></tr>
                            <tr><td>磁盘使用率</td><td>
                                <div class="layui-progress" lay-showpercent="yes">
                                    <div class="layui-progress-bar layui-bg-orange" lay-percent="65%"></div>
                                </div>
                            </td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="layui-row layui-col-space15" style="margin-top: 5px;">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">最近上线设备</div>
                <div class="layui-card-body">
                    <table class="layui-table" id="recent-devices" lay-filter="recent-devices">
                        <thead>
                            <tr>
                                <th>设备名称</th>
                                <th>Agent ID</th>
                                <th>IP地址</th>
                                <th>操作系统</th>
                                <th>状态</th>
                                <th>最后心跳</th>
                                <th>创建时间</th>
                            </tr>
                        </thead>
                        <tbody id="recent-devices-body">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    

</div>

<script>
    // 仪表盘页面配置
    function initPage() {
        PageManager.init('dashboard', {
            // 页面初始化回调
            onInit: function() {
                // 初始化仪表盘数据
                loadDashboardData();
                // 每秒更新系统状态
                setInterval(function() {
                    updateSystemStatus();
                }, 1000);
            }
        });
    }
    
    // 加载仪表盘数据
    function loadDashboardData() {
        // 设备总数和活跃设备数
        $.get('/api/v1/devices', function(data) {
            var deviceData = data.data || data;
            if (Array.isArray(deviceData)) {
                $('#stat-total-device').text(deviceData.length);
                // 活跃设备数
                var activeCount = deviceData.filter(function(item) {
                    return item.status === 'online';
                }).length;
                $('#stat-online-device').text(activeCount);
                
                // 最近上线设备（按最后心跳时间排序）
                var sortedDevices = deviceData.sort(function(a, b) {
                    return new Date(b.last_heartbeat) - new Date(a.last_heartbeat);
                }).slice(0, 10);
                renderRecentDevices(sortedDevices);
            }
        });
        
        // 隧道总数和活跃隧道数
        $.get('/api/v1/tunnels', function(data) {
            var tunnelData = data.data || data;
            if (Array.isArray(tunnelData)) {
                $('#stat-total-tunnel').text(tunnelData.length);
                // 活跃隧道数
                var activeCount = tunnelData.filter(function(item) {
                    return item.status === 'active';
                }).length;
                $('#stat-active-tunnel').text(activeCount);
            } else if (tunnelData && typeof tunnelData === 'object' && tunnelData.code === 200) {
                // 处理带有code和data字段的响应
                var tunnelArray = tunnelData.data || [];
                $('#stat-total-tunnel').text(tunnelArray.length);
                var activeCount = tunnelArray.filter(function(item) {
                    return item.status === 'active';
                }).length;
                $('#stat-active-tunnel').text(activeCount);
            }
        });
        
        // Token统计
        $.get('/api/v1/tokens', function(data) {
            var tokenData = data.data || data;
            if (Array.isArray(tokenData)) {
                $('#stat-total-token').text(tokenData.length);
                // 活跃Token数
                var activeCount = tokenData.filter(function(item) {
                    return item.status === 'active';
                }).length;
                $('#stat-active-token').text(activeCount);
            } else if (tokenData && typeof tokenData === 'object' && tokenData.code === 200) {
                // 处理带有code和data字段的响应
                var tokenArray = tokenData.data || [];
                $('#stat-total-token').text(tokenArray.length);
                var activeCount = tokenArray.filter(function(item) {
                    return item.status === 'active';
                }).length;
                $('#stat-active-token').text(activeCount);
            }
        });
    }
    
    // 渲染最近上线设备
    function renderRecentDevices(devices) {
        var tbody = $('#recent-devices-body');
        tbody.empty();
        
        if (devices.length === 0) {
            tbody.append('<tr><td colspan="7" style="text-align: center; color: #999; padding: 20px;">暂无设备</td></tr>');
            return;
        }
        
        devices.forEach(function(device) {
            var statusClass = device.status === 'online' ? 'layui-badge-dot layui-bg-green' : 'layui-badge-dot layui-bg-red';
            var statusText = device.status === 'online' ? '在线' : '离线';
            
            var tr = $('<tr></tr>');
            tr.append('<td>' + (device.name || '未命名') + '</td>');
            tr.append('<td>' + (device.agent_id || '') + '</td>');
            tr.append('<td>' + (device.ip_address || '') + '</td>');
            tr.append('<td>' + (device.os || '') + '</td>');
            tr.append('<td><span class="' + statusClass + '"></span> ' + statusText + '</td>');
            tr.append('<td>' + (device.last_heartbeat ? new Date(device.last_heartbeat).toLocaleString() : '-') + '</td>');
            tr.append('<td>' + (device.created_at ? new Date(device.created_at).toLocaleString() : '-') + '</td>');
            
            tbody.append(tr);
        });
    }
    
    // 更新系统状态
    function updateSystemStatus() {
        // 模拟当前连接数
        var connections = Math.floor(Math.random() * 50);
        $('#connections').text(connections);
        
        // 模拟CPU使用率
        var cpuUsage = Math.floor(Math.random() * 50) + 20; // 20-70%
        $('.layui-progress-bar.layui-bg-green').attr('lay-percent', cpuUsage + '%').css('width', cpuUsage + '%');
        
        // 模拟内存占用
        var memoryUsage = Math.floor(Math.random() * 30) + 30; // 30-60%
        $('.layui-progress-bar.layui-bg-blue').attr('lay-percent', memoryUsage + '%').css('width', memoryUsage + '%');
        
        // 模拟磁盘使用率
        var diskUsage = Math.floor(Math.random() * 20) + 60; // 60-80%
        $('.layui-progress-bar.layui-bg-orange').attr('lay-percent', diskUsage + '%').css('width', diskUsage + '%');
        
        // 更新进度条渲染
        PageManager.layui.element.render('progress');
    }
</script>
