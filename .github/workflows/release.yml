name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: |
          if [ ! -f go.mod ]; then
            go mod init tbore
          fi
          go mod tidy

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          BINARY_NAME="tbore"

          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME="tbore.exe"
          fi

          CGO_ENABLED=0 go build \
            -ldflags="-s -w -extldflags '-static'" \
            -o "$BINARY_NAME" \
            tbore.go

          RELEASE_NAME="tbore-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "$GOOS" = "windows" ]; then
            mv "$BINARY_NAME" "${RELEASE_NAME}.exe"
            sha256sum "${RELEASE_NAME}.exe" > "${RELEASE_NAME}.exe.sha256"
          else
            mv "$BINARY_NAME" "$RELEASE_NAME"
            sha256sum "$RELEASE_NAME" > "${RELEASE_NAME}.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tbore-${{ matrix.os }}-${{ matrix.arch }}
          path: tbore-*

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: Create combined checksums file
        run: |
          cd ./dist
          cat *.sha256 > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/tbore-*
            ./dist/checksums.txt
          body: |
            ## tbore ${{ github.ref_name }}

            ### � v0.7.0 重磅：爆破防护（Brute-Force Protection）

            本版本为 **安全大版本**，新增基于 IP 的认证失败限制机制，针对公网部署面临的 SSH 爆破攻击提供完整防护链路：

            - **\[SECURITY] 爆破防护**：连续认证失败超阈值即拉黑该 IP，默认 3 次失败拉黑 10 分钟。**零配置即安全**，老配置无需任何修改即可启用。
            - **\[SECURITY] 预握手拦截**：被拉黑的 IP 在 SSH 密钥交换**之前**直接关闭连接（TCP RST），跳过 RSA-2048 握手运算，单次拒绝开销从 ~3ms 降至 ~0.01ms（**约 300 倍提升**）。
            - **\[SECURITY] 持久化黑名单**：基于 bbolt 嵌入式 KV 数据库持久化拉黑记录，进程重启后黑名单仍然有效。
            - **\[SECURITY] 内存可控**：LRU 缓存 + bbolt 分层架构，5 万 IP 大规模爆破内存增长仅 ~0.36MB，杜绝 OOM 风险。
            - **\[SECURITY] 过期自清理**：后台定期清理过期记录，磁盘占用可控；拉黑窗口内再失败会顺延截止时间。

            ### 📋 使用说明

            **启动服务端：**
            ```bash
            ./tbore server -c server.yaml
            ```

            **启动客户端：**
            ```bash
            ./tbore client -c client.yaml
            ```

            **动态重载配置：**
            ```bash
            # 方式1：使用命令触发热加载
            ./tbore reload [-s /var/run/tbore-client.sock]

            # 方式2：使用 SIGHUP 信号触发热加载
            kill -HUP <client_pid>

            # 查看服务端状态
            ./tbore status [-s /var/run/tbore.sock]

            # 查看客户端隧道状态
            ./tbore client-status [-s /var/run/tbore-client.sock]
            ```

            **配置示例：**

            **服务端配置 (server.yaml)**：
            ```yaml
            port: 7835
            token: "your_secure_secret_token"  # 必填！
            min_port: 1024
            max_port: 65535
            max_connections: 100
            max_tunnels_per_client: 10
            max_conns_per_tunnel: 100          # v0.6.5 新增，未填默认跟随 max_connections
            bind_addr: "0.0.0.0"
            host_key_path: "./host_key"

            # 认证失败限制（爆破防护），默认启用（零配置即安全）
            auth_disabled: false                # 设为 true 可完全禁用
            auth_max_failures: 3                # 连续失败 N 次后拉黑该 IP
            auth_block_duration: 600            # 拉黑时长（秒）
            auth_lru_size: 1000                 # 内存 LRU 缓存大小（条）
            auth_block_db_path: "data/auth.db"  # bbolt 持久化文件路径，推荐 /var/lib/tbore/auth.db
            auth_clean_interval: 60             # 后台清理周期（秒）
            auth_record_ttl: 86400              # 过期记录磁盘保留时长（秒），默认 24 小时
            ```

            **客户端配置 (client.yaml)**：
            ```yaml
            server_addr: "your_server_ip"
            server_port: 7835
            token: "your_secure_secret_token"
            host_key: "SHA256:xxxx..."  # 可选，推荐填写以防止 MITM
            project: "your_project"      # 项目名称（可选）
            region: "your_region"        # 地域（可选）
            health_check_interval: 30    # 健康检查间隔（秒），默认30秒（可选）
            tunnels:
              - name: "web-service"
                local_ip: "127.0.0.1"
                local_port: 8080
                remote_port: 8501
                timeout: 300
            ```

            ### ⚠️ 注意事项
            - 爆破防护**默认启用**，所有参数均有默认值，老配置无需修改即可升级
            - 黑名单数据持久化到 `auth_block_db_path`（默认 `data/auth.db`），生产部署推荐配置为 `/var/lib/tbore/auth.db`
            - 拉黑判定基于客户端 IP 地址，NAT 网络下多个客户端共享同一公网 IP 时需注意
            - 对超大流量爆破建议同时联动 iptables / fail2ban 做内核态过滤
            - TCP 三次握手仍会建立（应用层无法避免），但预握手拦截会立即关闭，开销极低
            - 短连接依赖 TCP 半关闭信号秒级回收，空闲超时退化为最后兜底
            - 对长连接类服务（SSH 终端等）建议将 `timeout` 设为 0，避免长暂停被误杀
            - `max_conns_per_tunnel` 仅为整流器，建议同时按业务峰值合理设置
            - 热加载不会中断主 SSH 连接，已建立的隧道连接不受影响

            ### 📝 版本兼容性
            - v0.7.0 完全向后兼容所有历史版本
            - 新增的 7 个认证防护配置项全部可选，零值走默认值
            - 对低版本客户端**零影响**，所有防护逻辑在服务端完成，不改变协议
            - 如需完全禁用爆破防护（排障/兼容场景），设置 `auth_disabled: true` 即可回到旧行为
            - 强烈建议公网部署的用户升级到此版本

            ### 校验和 (SHA256)
            查看 `checksums.txt` 获取各个版本的哈希值。
          draft: false
          prerelease: false
