name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: |
          if [ ! -f go.mod ]; then
            go mod init tbore
          fi
          go mod tidy

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          BINARY_NAME="tbore"

          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME="tbore.exe"
          fi

          CGO_ENABLED=0 go build \
            -ldflags="-s -w -extldflags '-static'" \
            -o "$BINARY_NAME" \
            tbore.go

          RELEASE_NAME="tbore-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "$GOOS" = "windows" ]; then
            mv "$BINARY_NAME" "${RELEASE_NAME}.exe"
            sha256sum "${RELEASE_NAME}.exe" > "${RELEASE_NAME}.exe.sha256"
          else
            mv "$BINARY_NAME" "$RELEASE_NAME"
            sha256sum "$RELEASE_NAME" > "${RELEASE_NAME}.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tbore-${{ matrix.os }}-${{ matrix.arch }}
          path: tbore-*

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: Create combined checksums file
        run: |
          cd ./dist
          cat *.sha256 > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/tbore-*
            ./dist/checksums.txt
          body: |
            ## tbore ${{ github.ref_name }}

            ### 🔍 新增功能 (New Features)
            - **[新增]** 配置热加载功能，支持动态增删改隧道配置
            - **[新增]** `tbore reload` 命令，一键触发配置重载
            - **[新增]** `tbore client-status` 命令，查看客户端隧道状态
            - **[新增]** 客户端支持 Unix socket 控制接口（默认 `/var/run/tbore-client.sock`）
            - **[新增]** 支持 SIGHUP 信号触发热加载，便于运维自动化

            ### 🔧 改进 (Improvements)
            - **[改进]** 隧道智能增量更新，只处理变化的隧道，保持主连接不中断
            - **[改进]** 删除隧道时自动通知服务端释放端口，避免端口占用

            ### 🐛 Bug 修复
            - **[修复]** 修复隧道配置修改后（如 local_port 变化）未重新创建的问题

            ### 📋 使用说明

            **启动客户端：**
            ```bash
            ./tbore client -c client.yaml
            ```

            **动态重载配置：**
            ```bash
            # 方式1：使用命令触发热加载
            ./tbore reload [-s /var/run/tbore-client.sock]

            # 方式2：使用 SIGHUP 信号触发热加载
            kill -HUP <client_pid>

            # 查看客户端隧道状态
            ./tbore client-status [-s /var/run/tbore-client.sock]
            ```

            **配置示例：**

            **服务端配置 (server.yaml)**：
            ```yaml
            port: 7835
            token: "your_secure_secret_token"  # 必填！
            min_port: 1024
            max_port: 65535
            max_connections: 100
            max_tunnels_per_client: 10
            bind_addr: "0.0.0.0"
            host_key_path: "./host_key"
            ```

            **客户端配置 (client.yaml)**：
            ```yaml
            server_addr: "your_server_ip"
            server_port: 7835
            token: "your_secure_secret_token"
            host_key: "SHA256:xxxx..."  # 可选，推荐填写以防止 MITM
            project: "your_project"      # 项目名称（可选）
            region: "your_region"        # 地域（可选）
            health_check_interval: 30    # 健康检查间隔（秒），默认30秒（可选）
            tunnels:
              - name: "web-service"
                local_ip: "127.0.0.1"
                local_port: 8080
                remote_port: 8501
            ```

            ### ⚠️ 热加载注意事项
            - 热加载不会中断主 SSH 连接，已建立的隧道连接不受影响
            - 只有变化的隧道会被处理，未修改的隧道保持运行
            - 删除隧道时会通知服务端释放端口，端口可被重新分配
            - 新配置会先验证，无效配置不会生效
            - 正在进行重载时重复触发会被忽略

            ### 校验和 (SHA256)
            查看 `checksums.txt` 获取各个版本的哈希值。
          draft: false
          prerelease: false
