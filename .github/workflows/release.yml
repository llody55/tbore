name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: |
          if [ ! -f go.mod ]; then
            go mod init tbore
          fi
          go mod tidy

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          BINARY_NAME="tbore"

          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME="tbore.exe"
          fi

          CGO_ENABLED=0 go build \
            -ldflags="-s -w -extldflags '-static'" \
            -o "$BINARY_NAME" \
            tbore.go

          RELEASE_NAME="tbore-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "$GOOS" = "windows" ]; then
            mv "$BINARY_NAME" "${RELEASE_NAME}.exe"
            sha256sum "${RELEASE_NAME}.exe" > "${RELEASE_NAME}.exe.sha256"
          else
            mv "$BINARY_NAME" "$RELEASE_NAME"
            sha256sum "$RELEASE_NAME" > "${RELEASE_NAME}.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tbore-${{ matrix.os }}-${{ matrix.arch }}
          path: tbore-*

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: Create combined checksums file
        run: |
          cd ./dist
          cat *.sha256 > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/tbore-*
            ./dist/checksums.txt
          body: |
            ## tbore ${{ github.ref_name }}

            ### � 修复内容
            - **[CRITICAL FIX] 半关闭对称传播**：修复短连接（HTTP/1.0、后端 `Connection: close`、SSH 退出等）任一端 close 后隧道无法即时回收的问题。如今可秒级回收 FD 与缓冲，不再依赖空闲超时兜底。
            - **[FIX] 活跃连接计数**：修复 `handleClientConnection` 中活跃连接计数递减不完整的问题，统一由 defer 释放信号量与计数。
            - **[FIX] 日志格式化**：修复日志中 `%d` 与 `float64` 类型不匹配的告警。

            ### � 新增功能
            - **[SECURITY] 单隧道并发连接上限**：新增服务端配置项 `max_conns_per_tunnel`，对每条隧道的转发连接并发数做准入控制，超出即拒绝，防止单条隧道被突发短连接打爆 server 的 FD / 内存。未显式配置时默认跟随 `max_connections`，向后兼容。

            ### 📋 使用说明

            **启动服务端：**
            ```bash
            ./tbore server -c server.yaml
            ```

            **启动客户端：**
            ```bash
            ./tbore client -c client.yaml
            ```

            **动态重载配置：**
            ```bash
            # 方式1：使用命令触发热加载
            ./tbore reload [-s /var/run/tbore-client.sock]

            # 方式2：使用 SIGHUP 信号触发热加载
            kill -HUP <client_pid>

            # 查看服务端状态
            ./tbore status [-s /var/run/tbore.sock]

            # 查看客户端隧道状态
            ./tbore client-status [-s /var/run/tbore-client.sock]
            ```

            **配置示例：**

            **服务端配置 (server.yaml)**：
            ```yaml
            port: 7835
            token: "your_secure_secret_token"  # 必填！
            min_port: 1024
            max_port: 65535
            max_connections: 100
            max_tunnels_per_client: 10
            max_conns_per_tunnel: 100          # v0.6.5 新增，未填默认跟随 max_connections
            bind_addr: "0.0.0.0"
            host_key_path: "./host_key"
            ```

            **客户端配置 (client.yaml)**：
            ```yaml
            server_addr: "your_server_ip"
            server_port: 7835
            token: "your_secure_secret_token"
            host_key: "SHA256:xxxx..."  # 可选，推荐填写以防止 MITM
            project: "your_project"      # 项目名称（可选）
            region: "your_region"        # 地域（可选）
            health_check_interval: 30    # 健康检查间隔（秒），默认30秒（可选）
            tunnels:
              - name: "web-service"
                local_ip: "127.0.0.1"
                local_port: 8080
                remote_port: 8501
                timeout: 300
            ```

            ### ⚠️ 注意事项
            - 短连接现在依赖 TCP 半关闭信号秒级回收，空闲超时退化为最后兜底
            - 对长连接类服务（SSH 终端等）建议将 `timeout` 设为 0，避免长暂停被误杀
            - `max_conns_per_tunnel` 仅为整流器，建议同时按业务峰值合理设置，而非无限放大
            - 热加载不会中断主 SSH 连接，已建立的隧道连接不受影响

            ### 📝 版本兼容性
            - v0.6.5 完全向后兼容所有历史版本
            - 新增配置项 `max_conns_per_tunnel` 为可选字段，老配置无需修改即可升级
            - 建议公网部署的用户升级到此版本以获得连接回收与并发保护

            ### 校验和 (SHA256)
            查看 `checksums.txt` 获取各个版本的哈希值。
          draft: false
          prerelease: false
