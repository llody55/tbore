name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: |
          if [ ! -f go.mod ]; then
            go mod init tbore
          fi
          go mod tidy

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          BINARY_NAME="tbore"

          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME="tbore.exe"
          fi

          CGO_ENABLED=0 go build \
            -ldflags="-s -w -extldflags '-static'" \
            -o "$BINARY_NAME" \
            tbore.go

          RELEASE_NAME="tbore-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "$GOOS" = "windows" ]; then
            mv "$BINARY_NAME" "${RELEASE_NAME}.exe"
            sha256sum "${RELEASE_NAME}.exe" > "${RELEASE_NAME}.exe.sha256"
          else
            mv "$BINARY_NAME" "$RELEASE_NAME"
            sha256sum "$RELEASE_NAME" > "${RELEASE_NAME}.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tbore-${{ matrix.os }}-${{ matrix.arch }}
          path: tbore-*

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: Create combined checksums file
        run: |
          cd ./dist
          cat *.sha256 > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/tbore-*
            ./dist/checksums.txt
          body: |
            ## tbore ${{ github.ref_name }}

            ### 🔍 新增功能 (New Features)
            - **[新增]** 隧道信息显示优化，支持显示隧道名称和完整的本地地址映射
            - **[新增]** 客户端支持配置 `project` 和 `region` 字段，便于服务端识别和管理
            - **[新增]** `tbore status` 命令，支持查看服务端实时连接状态和隧道映射信息

            ### 🔧 改进 (Improvements)
            - **[改进]** 优化端口释放逻辑，客户端断开后立即释放占用的端口
            - **[改进]** 错误日志添加客户端来源IP信息，便于定位问题

            ### 🐛 Bug 修复
            - **[CRITICAL FIX]** 修复隧道映射完全不可用的问题（客户端未处理服务端发起的通道请求）
            - **[修复]** 修复地址解析错误，`msg.Addr` 已经是完整地址格式，不需要再次拼接端口
            - **[修复]** 修复认证数据长度不足导致的 panic 问题
            - **[修复]** 修复客户端断开后端口未正确释放的问题
            - **[修复]** 修复客户端配置缺少验证的问题
            - **[修复]** 修复资源泄漏问题（local 连接未正确关闭）
            - **[修复]** 修复 copyBuffer 函数写入错误被忽略的问题

            ### 📋 配置示例

            **服务端配置 (server.yaml)**：
            ```yaml
            port: 7835
            token: "your_secure_secret_token"  # 必填！
            min_port: 1024
            max_port: 65535
            max_connections: 100
            max_tunnels_per_client: 10
            bind_addr: "0.0.0.0"
            host_key_path: "./host_key"
            ```

            **客户端配置 (client.yaml)**：
            ```yaml
            server_addr: "your_server_ip"
            server_port: 7835
            token: "your_secure_secret_token"
            host_key: "SHA256:xxxx..."  # 可选，推荐填写以防止 MITM
            project: "your_project"      # 项目名称（可选）
            region: "your_region"        # 地域（可选）
            tunnels:
              - name: "web-service"
                local_ip: "127.0.0.1"
                local_port: 8080
                remote_port: 8501
            ```

            ### 校验和 (SHA256)
            查看 `checksums.txt` 获取各个版本的哈希值。
          draft: false
          prerelease: false
