name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: |
          if [ ! -f go.mod ]; then
            go mod init tbore
          fi
          go mod tidy

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          BINARY_NAME="tbore"

          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME="tbore.exe"
          fi

          CGO_ENABLED=0 go build \
            -ldflags="-s -w -extldflags '-static'" \
            -o "$BINARY_NAME" \
            tbore.go

          RELEASE_NAME="tbore-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "$GOOS" = "windows" ]; then
            mv "$BINARY_NAME" "${RELEASE_NAME}.exe"
            sha256sum "${RELEASE_NAME}.exe" > "${RELEASE_NAME}.exe.sha256"
          else
            mv "$BINARY_NAME" "$RELEASE_NAME"
            sha256sum "$RELEASE_NAME" > "${RELEASE_NAME}.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tbore-${{ matrix.os }}-${{ matrix.arch }}
          path: tbore-*

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: Create combined checksums file
        run: |
          cd ./dist
          cat *.sha256 > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/tbore-*
            ./dist/checksums.txt
          body: |
            ## tbore ${{ github.ref_name }}

            ### ⚠️ 重要说明
            - **配置不兼容**：由于全面升级了安全特性配置格式，**v0.4.0 不兼容 v0.3.x 版本**。请参考 `server.yaml.example` 和 `client.yaml.example` 重新配置。

            ### 🔒 安全性改进 (Security)
            - **[重大]** 引入 HMAC-SHA256 挑战-响应认证机制，有效防止暴力破解和重放攻击
            - **[重大]** 实现主机密钥持久化存储与验证，有效防止中间人攻击 (MITM)
            - **[重大]** 强制要求 Token 认证，服务端必须配置 Token 才能启动
            - **[改进]** 端口范围限制（默认 1024-65535），防止绑定特权端口（1-1023）
            - **[改进]** 连接数限制（默认 100），防止 DoS 攻击
            - **[改进]** 隧道数限制（默认 10），防止单个客户端耗尽端口资源

            ### 🏗️ 架构改进 (Architecture)
            - **[重构]** 项目全面模块化重构，代码结构更加清晰
            - **[重构]** 服务端支持配置文件启动（`-c server.yaml`）
            - **[重构]** 客户端配置格式升级，支持更多选项

            ### 🐛 Bug 修复
            - 修复信号量管理逻辑错误导致的 panic
            - 修复 SSH 配置未正确传递的问题
            - 修复 copyBuffer 函数错误处理不完善的问题
            - 修复隧道计数逻辑错误

            ### 📋 配置示例

            **服务端配置 (server.yaml)**：
            ```yaml
            port: 7835
            token: "your_secure_secret_token"  # 必填！
            min_port: 1024
            max_port: 65535
            max_connections: 100
            max_tunnels_per_client: 10
            bind_addr: "0.0.0.0"
            host_key_path: "./host_key"
            ```

            **客户端配置 (client.yaml)**：
            ```yaml
            server_addr: "your_server_ip"
            server_port: 7835
            token: "your_secure_secret_token"
            host_key: "SHA256:xxxx..."  # 可选，推荐填写以防止 MITM
            tunnels:
              - name: "web-service"
                local_ip: "127.0.0.1"
                local_port: 8080
                remote_port: 8501
            ```

            ### 校验和 (SHA256)
            查看 `checksums.txt` 获取各个版本的哈希值。
          draft: false
          prerelease: false
